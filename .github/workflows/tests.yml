name: tester

on:
  pull_request:
    branches:
      - "master"
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review

jobs:
  pr-title-validator:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title format
        shell: bash
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Strict rule: contestant/<name>
          # Example: contestant/alice-01
          if [[ ! "$PR_TITLE" =~ ^contestant\/[a-z0-9._-]+$ ]]; then
            echo "Invalid PR title: '$PR_TITLE'"
            echo "Required format: contestant/<name>"
            exit 1
          fi

  test-validator:
    needs: pr-title-validator
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ../
    steps:
      - name: Checkout to working directory
        uses: actions/checkout@v5

      - name: Run Easy tests
        env:
          PR_USER: ${{ github.event.pull_request.user.login }}
          PR_DATE: ${{ github.event.pull_request.created_at}}
        run: ./easy.sh $PR_USER $PR_DATE

      - name: Run Medium tests
        env:
          PR_USER: ${{ github.event.pull_request.user.login }}
          PR_DATE: ${{ github.event.pull_request.created_at}}
        run: |
          chmod +x ./medium.sh
          ./medium.sh $PR_USER $PR_DATE

      - name: Run Hard tests
        env:
          PR_USER: ${{ github.event.pull_request.user.login }}
          PR_DATE: ${{ github.event.pull_request.created_at}}
        run: |
          chmod +x ./hard.sh
          ./hard.sh $PR_USER $PR_DATE



          


